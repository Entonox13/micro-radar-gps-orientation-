name: Build Android APK

on:
  push:
    branches: [main, 'cursor/**']
    paths:
      - 'android/**'
      - 'microradar_core/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    paths:
      - 'android/**'
      - 'microradar_core/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            android/.buildozer
            ~/.buildozer
          key: buildozer-v6-${{ hashFiles('android/buildozer.spec') }}
          restore-keys: |
            buildozer-v6-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev automake \
            gettext autopoint

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Verify Android app (headless)
        run: |
          pip install -r android/requirements.txt certifi
          python android/verify_app.py

      - name: Stage shared package for APK bundle
        run: cp -r microradar_core android/microradar_core

      - name: Build debug APK
        working-directory: android
        env:
          USE_SDK_WRAPPER: 1
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        run: |
          for attempt in 1 2 3; do
            echo "Buildozer attempt ${attempt}/3"
            if buildozer -v android debug; then
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              echo "Build failed, retrying in 30s (transient download errors)..."
              sleep 30
            fi
          done
          exit 1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: micro-radar-debug-apk
          path: android/bin/*.apk
          if-no-files-found: error

      - name: Upload APK to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
